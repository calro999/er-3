name: Auto Manga Post (er-3)

on:
  schedule:
    - cron: '0 3,15 * * *'  # JST 12:00 / 24:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Manga Generator
        run: python generate_manga_posts.py

      - name: Bundle Manga
        run: node bundle_manga.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/manga/ manga_cache.txt public/data/manga.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update manga database (er-3)"
            git pull --rebase origin main
            git push
          fi
