name: Fetch FANZA and Build Next.js Site

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Crawler
        env:
          FANZA_API_ID: ${{ secrets.FANZA_API_ID }}
          FANZA_AFFILIATE_ID: ${{ secrets.FANZA_AFFILIATE_ID }}
        run: python fanza_crawler.py

      - name: Bundle Posts
        run: node bundle_posts.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/posts/ posted_cache.txt public/data/posts.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update posts database and cache"
            git push
          fi
